<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaks Auto | Automation v4.4</title>
    <style>
        :root { 
            --bg: #f4f7f6; --text: #1a1a1a; --card-bg: #ffffff; 
            --matrix-green: #00ff41; --primary: #003366; --accent: #e31e24; 
        }
        [data-theme='dark'] { 
            --bg: #0a0a0a; --text: #00ff41; --card-bg: #111; 
            --primary: #00ff41; --accent: #008f11; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--text); 
            transition: 0.3s; 
        }

        /* Fixed Background layer */
        #canvas { position: fixed; top: 0; left: 0; z-index: 0; background: #000; }

        /* Login Layer */
        #loginPage { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }
        .terminal-box { 
            background: rgba(0, 10, 0, 0.9); border: 2px solid var(--matrix-green); 
            padding: 30px; border-radius: 10px; text-align: center; width: 320px;
        }

        /* Main App Layer - Ensuring it stays above the matrix */
        #mainPage { 
            display: none; position: relative; z-index: 10; 
            min-height: 100vh; background-color: var(--bg);
        }

        header { 
            padding: 15px; background: var(--primary); color: white; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        #liveStats { 
            background: #000; color: var(--matrix-green); padding: 15px; 
            border-radius: 8px; font-family: monospace; font-size: 12px; margin-bottom: 20px;
        }

        .app-btn { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-green { background: #28a745; }
        .btn-green:disabled { background: #444; cursor: not-allowed; }
        .btn-gold { background: #ffc107; color: #000; }

        #map { 
            height: 300px; border-radius: 10px; border: 2px solid var(--primary); 
            margin: 20px 0; background: #222; overflow: hidden;
        }

        .theme-btn { 
            padding: 5px 15px; border-radius: 5px; border: 1px solid #fff; 
            background: transparent; color: #fff; cursor: pointer; 
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="loginPage">
    <div class="terminal-box">
        <h3 style="color: var(--matrix-green);">PEAKS AUTO v4.4</h3>
        <input id="user" type="text" style="width:100%; padding:10px; margin:10px 0;" placeholder="EMPLOYEE_ID">
        <input id="pass" type="password" style="width:100%; padding:10px; margin:10px 0;" placeholder="ACCESS_TOKEN">
        <button class="hacker-btn" style="width:100%; padding:12px; background:var(--matrix-green); color:#000; border:none; cursor:pointer;" onclick="startLogin()">SYNC SYSTEM</button>
    </div>
</div>

<div id="mainPage">
    <header>
        <span id="welcome">Staff: GUEST</span>
        <button class="theme-btn" onclick="toggleMode()">🌓 THEME</button>
    </header>

    <div class="container">
        <div id="liveStats">
            <div>[STATUS]: <span id="status" style="color:red">OFFLINE</span></div>
            <div>[STREET]: <span id="addr" style="color:white">Waiting for GPS...</span></div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button id="logBtn" class="app-btn btn-green" onclick="doLog()" disabled>WAITING FOR GPS</button>
            <button class="app-btn btn-gold" onclick="doExport()">DOWNLOAD CSV</button>
        </div>

        <div id="map"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let user = "Unknown";
    let logs = JSON.parse(localStorage.getItem("peaks_logs") || "[]");
    let currentPos = null;
    let currentAddr = null;

    // Matrix effect
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function matrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0'; ctx.font = '16px monospace';
        drops.forEach((y, i) => {
            ctx.fillText("01"[Math.floor(Math.random()*2)], i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(matrix, 35);

    function toggleMode() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function startLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u && p === "1234") {
            user = u;
            document.getElementById('welcome').innerText = "Staff: " + u.toUpperCase();
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            initGPS();
        }
    }

    function initGPS() {
        navigator.geolocation.watchPosition(async (p) => {
            currentPos = p.coords;
            const lat = p.coords.latitude; const lng = p.coords.longitude;
            document.getElementById('status').innerText = "SIGNAL_LOCKED";
            document.getElementById('status').style.color = "#00ff41";
            document.getElementById('map').innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe>`;

            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const d = await r.json();
                currentAddr = d.display_name || "Srinagar Area";
                document.getElementById('addr').innerText = currentAddr;
                document.getElementById('logBtn').disabled = false;
                document.getElementById('logBtn').innerText = "💾 LOG VISIT";
            } catch(e) {}
        }, null, {enableHighAccuracy: true});
    }

    function doLog() {
        logs.push({
            staff: user,
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString(),
            lat: currentPos.latitude,
            lng: currentPos.longitude,
            addr: currentAddr.replace(/,/g, "")
        });
        localStorage.setItem("peaks_logs", JSON.stringify(logs));
        alert("Visit Logged for " + user);
    }

    function doExport() {
        let csv = "Employee,Date,Time,Lat,Lng,Address\n" + 
            logs.map(l => `${l.staff},${l.date},${l.time},${l.lat},${l.lng},"${l.addr}"`).join("\n");
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Report_${user}.csv`;
        a.click();
    }
</script>
</body>
</html>

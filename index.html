
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arundeep Doctor Tracker Pro | Neural Link</title>
    <style>
        :root {
            --primary: #00ff41; 
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --accent: #008f11;
            --text-gray: #888;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* --- MATRIX BACKGROUND --- */
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.2;
        }

        /* --- LOGIN PAGE --- */
        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1s ease-in-out;
        }

        .hacker-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .hacker-input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            padding: 15px;
            color: var(--primary);
            margin-bottom: 15px;
            outline: none;
        }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- MAIN APP PAGE --- */
        #mainPage { 
            display: none; 
            padding: 20px; 
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,255,65,0.05);
        }

        .search-box {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* --- DOCTOR CARDS --- */
        #list {
            display: grid;
            gap: 15px;
        }

        .dr-card {
            background: rgba(10, 10, 10, 0.8);
            border-left: 3px solid var(--primary);
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .dr-card:hover {
            background: rgba(0, 255, 65, 0.05);
            transform: scale(1.02);
        }

        .dr-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: white; }
        .dr-meta { font-size: 11px; color: var(--text-gray); line-height: 1.4; }
        .spec-tag { color: var(--primary); font-size: 12px; margin-top: 5px; display: block; }

        /* --- VISIT LOG --- */
        .visit-log {
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #222;
            padding: 10px;
            background: #000;
        }

        .visit-entry {
            border-bottom: 1px solid #222;
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }

        .visit-entry a { color: #00c6ff; text-decoration: none; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { 
            padding: 12px; border: 1px solid var(--primary); background: transparent; 
            color: var(--primary); cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .action-btn:active { background: var(--primary); color: black; }

    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div id="loginPage">
    <div class="hacker-container">
        <div style="font-size: 12px; margin-bottom: 20px;">SYSTEM IDENTIFICATION REQUIRED</div>
        <input type="text" id="user" class="hacker-input" placeholder="USERNAME" autocomplete="off">
        <input type="password" id="pass" class="hacker-input" placeholder="ENCRYPTION_KEY">
        <button class="btn-auth" onclick="startHack()">EXECUTE LOGIN</button>
        <div id="terminalLog" style="margin-top: 15px; font-size: 10px; height: 60px; overflow: hidden; text-align: left; opacity: 0.7;"></div>
    </div>
</div>

<div id="mainPage">
    <div class="glass-panel" style="text-align: center; border-bottom: 3px solid var(--primary);">
        <h2 style="margin: 0; letter-spacing: 4px;">SYSTEM_TRACKER_PRO</h2>
        <div id="liveClock" style="font-size: 12px; margin-top: 5px; color: white;"></div>
    </div>

    <div class="glass-panel">
        <input id="search" class="search-box" placeholder="SEARCH_DATABASE_..." onkeyup="searchDoctor()">
        
        <div class="btn-row">
            <button class="action-btn" onclick="getLocation()">SYNC_GPS</button>
            <button class="action-btn" onclick="exportExcel()">DUMP_XLSX</button>
        </div>
        <div id="gpsStatus" style="font-size: 10px; color: white; text-align: center;">GPS_OFFLINE</div>
    </div>

    <div class="glass-panel">
        <div style="font-size: 12px; margin-bottom: 10px;">LIVE_VISIT_HISTORY</div>
        <div id="visitLog" class="visit-log">
            <div style="color:#444">No visits recorded in current session...</div>
        </div>
    </div>

    <h4 id="countLabel" style="margin-left: 10px;">RECORDS_FOUND: 0</h4>
    <div id="list"></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
    // --- MATRIX ---
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 16, y * 16);
            if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 40);

    // --- CLOCK ---
    setInterval(() => {
        document.getElementById('liveClock').innerText = "SYSTEM_TIME: " + new Date().toLocaleString();
    }, 1000);

    // --- DATA ---
    const doctors = [
        { name: "Khalid . Wani", spec: "Consulting Physician", qual: "MD INTERNAL MEDICINE", city: "SRINAGAR", pin: "190005" },
        { name: "MOHSIN BIN MUSHTAQ", spec: "GENERAL PHYSICIAN", qual: "MD INTERNAL MEDICINE", city: "SRINAGAR", pin: "190010" },
        { name: "Manzoor Ahmad Chalkoo", spec: "Urologists", qual: "DNB UROLOGY", city: "SRINAGAR", pin: "190010" },
        { name: "Mohd Ashraf Lone", spec: "LAPAROSCOPIC SURGEON", qual: "DNB GEN SURGERY", city: "SRINAGAR", pin: "190003" },
        { name: "Muzaffar Nazir", spec: "PHYSICIAN", qual: "GENERAL MEDICINE", city: "SRINAGAR", pin: "190003" },
        { name: "Muzzafar Zargar", spec: "GENERAL PHYSICIAN", qual: "M D GEN MED", city: "SRINAGAR", pin: "190003" },
        { name: "Nisar Ahmad Shah", spec: "SURGEON", qual: "MBBS MS", city: "SRINAGAR", pin: "190003" },
        { name: "Shahzada . Parray", spec: "Consulting Physician", qual: "MD INTERNAL MEDICINE", city: "SRINAGAR", pin: "190003" },
        { name: "AKIL Latif Lone", spec: "SURGEON", qual: "MS GENERAL SURGERY", city: "SRINAGAR (NORTH)", pin: "190011" },
        { name: "Abbas Khan", spec: "NEPHROLOGIST", qual: "DM NEPHROLOGY", city: "SRINAGAR", pin: "190010" },
        { name: "Abid Sheik", spec: "NEPHROLOGIST", qual: "DM NEPHROLOGY", city: "SRINAGAR", pin: "190010" },
        { name: "Aisha Kouser", spec: "GENERAL PHYSICIAN", qual: "MD INTERNAL MEDICINE", city: "ANANTNAG", pin: "192101" },
        { name: "Ghulam Hassan Sheikh", spec: "CHEST PHYSICIAN", qual: "MBBS MD", city: "SOPORE", pin: "193202" },
        { name: "Lateef . Ahmad", spec: "SURGEON", qual: "MS GENERAL SURGERY", city: "SOPORE", pin: "193201" },
        { name: "Suhail Masood Khan", spec: "UROLOGIST", qual: "M Ch UROLOGY", city: "SOPORE", pin: "193201" }
    ];

    let userLat = null, userLng = null;

    function addLog(m) {
        const t = document.getElementById('terminalLog');
        t.innerHTML += `<div>> ${m}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    function startHack() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            addLog("Authenticating...");
            setTimeout(() => addLog("Handshake successful."), 300);
            setTimeout(() => addLog("Decrypting data blocks..."), 600);
            setTimeout(() => {
                document.getElementById('loginPage').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainPage').style.display = 'block';
                    render(doctors);
                }, 500);
            }, 1200);
        } else {
            addLog("ACCESS_DENIED");
        }
    }

    function render(data) {
        const list = document.getElementById('list');
        list.innerHTML = "";
        data.forEach(d => {
            list.innerHTML += `
                <div class="dr-card" onclick="markVisit('${d.name}')">
                    <div class="dr-name">${d.name}</div>
                    <span class="spec-tag">${d.spec}</span>
                    <div class="dr-meta">
                        QUAL: ${d.qual}<br>
                        LOCATION: ${d.city} (${d.pin})
                    </div>
                    <div style="font-size:9px; color:var(--primary); margin-top:10px; opacity:0.5;">[CLICK TO SAVE VISIT]</div>
                </div>`;
        });
        document.getElementById('countLabel').innerText = "RECORDS_FOUND: " + data.length;
    }

    function searchDoctor() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = doctors.filter(d => d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.spec.toLowerCase().includes(q));
        render(filtered);
    }

    function getLocation() {
        document.getElementById('gpsStatus').innerText = "QUERYING_SATELLITES...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                userLat = p.coords.latitude;
                userLng = p.coords.longitude;
                document.getElementById('gpsStatus').innerText = `LAT:${userLat.toFixed(4)} LNG:${userLng.toFixed(4)} [READY]`;
            });
        }
    }

    function markVisit(drName) {
        if(!userLat) {
            alert("Sync GPS before marking visit!");
            return;
        }
        const time = new Date().toLocaleTimeString();
        const log = document.getElementById('visitLog');
        if(log.innerText.includes("No visits")) log.innerHTML = "";
        
        const mapUrl = `https://www.google.com/maps?q=${userLat},${userLng}`;
        
        const entry = document.createElement('div');
        entry.className = "visit-entry";
        entry.innerHTML = `
            <span><b>${drName}</b> at ${time}</span>
            <a href="${mapUrl}" target="_blank">[MAP]</a>
        `;
        log.prepend(entry);
        alert(`Visit Recorded for ${drName}`);
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(doctors);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Database");
        XLSX.writeFile(wb, "System_Dump.xlsx");
    }
</script>
</body>
</html>

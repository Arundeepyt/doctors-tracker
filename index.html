<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arundeep Doctor Tracker Pro | J&K Database</title>
    <style>
        :root {
            --primary: #00ff41; 
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
            --accent: #008f11;
            --text-gray: #aaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* --- MATRIX BACKGROUND --- */
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.25;
        }

        /* --- LOGIN PAGE --- */
        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.8s ease-in-out;
        }

        .hacker-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--primary);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.15);
            padding: 35px;
            text-align: center;
            border-radius: 2px;
        }

        .hacker-input {
            width: 100%;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--accent);
            padding: 15px;
            color: var(--primary);
            margin-bottom: 15px;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MAIN APP PAGE --- */
        #mainPage { 
            display: none; 
            padding: 15px; 
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .search-box {
            width: 100%;
            background: #000;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }

        /* --- DOCTOR CARDS --- */
        #list { display: grid; gap: 12px; }

        .dr-card {
            background: rgba(20, 20, 20, 0.9);
            border-left: 4px solid var(--primary);
            padding: 15px;
            transition: 0.2s;
            cursor: pointer;
        }

        .dr-card:active { background: #111; transform: scale(0.98); }

        .dr-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .dr-meta { font-size: 11px; color: var(--text-gray); line-height: 1.5; }
        .spec-tag { color: var(--primary); font-size: 12px; font-weight: bold; margin: 5px 0; display: block; text-transform: uppercase;}

        /* --- VISIT LOG --- */
        .visit-log {
            font-size: 10px;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #222;
            padding: 10px;
            background: #000;
            color: #00c6ff;
        }

        .visit-entry {
            border-bottom: 1px solid #111;
            padding: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visit-entry a { color: #ff003c; text-decoration: none; border: 1px solid #ff003c; padding: 2px 5px; border-radius: 3px; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .action-btn { 
            padding: 12px; border: 1px solid var(--primary); background: transparent; 
            color: var(--primary); cursor: pointer; font-size: 11px; font-weight: bold;
        }
        .action-btn:active { background: var(--primary); color: #000; }

        #gpsStatus { font-size: 10px; color: #fff; text-align: center; margin-top: 5px; }

    </style>
</head>

<canvas id="matrixCanvas"></canvas>

<div id="loginPage">
    <div class="hacker-container">
        <div style="font-size: 14px; margin-bottom: 25px; letter-spacing: 3px;">INTERNAL ACCESS ONLY</div>

        <input type="password" id="pass" class="hacker-input" placeholder="KEY: 1234">
        <button class="btn-auth" onclick="startHack()">INITIATE SEQUENCE</button>
        <div id="terminalLog" style="margin-top: 20px; font-size: 10px; height: 50px; overflow: hidden; text-align: left; color: var(--accent);"></div>
    </div>
</div>

        { name: "Yasir . Qadri", spec: "UROLOGIST", qual: "MS DNB UROLOGY", city: "SRINAGAR", pin: "190010" },
        { name: "Zahid Mohd Rather", spec: "UROLOGIST", qual: "MS GENERAL SURGERY", city: "ANANTNAG", pin: "192101" },
        { name: "Zahoor Ah Gilkar", spec: "UROLOGIST", qual: "M Ch UROLOGY", city: "MOHMMAD PORA", pin: "192231" },
        { name: "Zaid Rather", spec: "UROLOGIST", qual: "MS DNB UROLOGY", city: "ANANTNAG", pin: "192101" },
        { name: "saba Ulalam", spec: "UROLOGIST", qual: "M Ch UROLOGY", city: "SRINAGAR", pin: "19000" }
    ];

    let userLat = null, userLng = null;

    function addLog(m) {
        const t = document.getElementById('terminalLog');
        t.innerHTML += `<div>>> ${m}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    function startHack() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            addLog("AUTHENTICATING...");
            setTimeout(() => addLog("BYPASSING FIREWALL..."), 200);
            setTimeout(() => addLog("DATABASE SYNCED."), 400);
            setTimeout(() => {
                document.getElementById('loginPage').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainPage').style.display = 'block';
                    render(doctors);
                }, 500);
            }, 800);
        } else {
            addLog("ACCESS_DENIED_ERROR");
        }
    }

    function render(data) {
        const list = document.getElementById('list');
        list.innerHTML = "";
        data.forEach(d => {
            list.innerHTML += `
                <div class="dr-card" onclick="markVisit('${d.name}')">
                    <div class="dr-name">${d.name}</div>
                    <span class="spec-tag">${d.spec}</span>
                    <div class="dr-meta">
                        QUAL: ${d.qual}<br>
                        LOCATION: ${d.city} (${d.pin})
                    </div>
                </div>`;
        });
        document.getElementById('countLabel').innerText = "RECORDS LOADED: " + data.length;
    }

    function searchDoctor() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = doctors.filter(d => 
            d.name.toLowerCase().includes(q) || 
            d.city.toLowerCase().includes(q) || 
            d.spec.toLowerCase().includes(q) ||
            d.qual.toLowerCase().includes(q)
        );
        render(filtered);
    }

    function getLocation() {
        document.getElementById('gpsStatus').innerText = "QUERYING SATELLITES...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                userLat = p.coords.latitude;
                userLng = p.coords.longitude;
                document.getElementById('gpsStatus').innerText = `SAT_LINK: ${userLat.toFixed(4)},${userLng.toFixed(4)}`;
            }, () => {
                document.getElementById('gpsStatus').innerText = "GPS_ERROR: PERMISSION DENIED";
            });
        }
    }

    function markVisit(drName) {
        if(!userLat) {
            alert("SYNC GPS BEFORE MARKING VISIT!");
            return;
        }
        const time = new Date().toLocaleTimeString();
        const log = document.getElementById('visitLog');
        if(log.innerText.includes("Waiting")) log.innerHTML = "";
        
        const mapUrl = `https://www.google.com/maps?q=${userLat},${userLng}`;
        
        const entry = document.createElement('div');
        entry.className = "visit-entry";
        entry.innerHTML = `
            <span>[${time}] <b>${drName}</b></span>
            <a href="${mapUrl}" target="_blank">MAP</a>
        `;
        log.prepend(entry);
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(doctors);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Master_Database");
        XLSX.writeFile(wb, "Doctor_Records_Export.xlsx");
    }

    setInterval(() => {
        document.getElementById('liveClock').innerText = "SYS_TIME: " + new Date().toLocaleString();
    }, 1000);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arundeep Doctor Tracker Pro</title>

<style>
:root {
    --matrix-green: #00ff41;
    --dark-bg: #000800;
    --primary: #00c6ff;
    --success: #28a745;
    --warning: #ffc107;
}

body, html {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: var(--dark-bg);
    color: var(--matrix-green);
}

/* LOGIN */
#loginPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.terminal-box {
    border: 2px solid var(--matrix-green);
    padding: 20px;
    width: 300px;
}

.hacker-input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: black;
    color: var(--matrix-green);
    border: 1px solid var(--matrix-green);
}

.hacker-btn {
    width: 100%;
    padding: 10px;
    background: var(--matrix-green);
    border: none;
    cursor: pointer;
}

/* MAIN */
#mainPage {
    display: none;
    background: #f0f2f5;
    color: #333;
}

header {
    background: #1d2671;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.dr-name {
    font-weight: bold;
    color: #1d2671;
}

.app-btn {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: none;
    color: white;
    cursor: pointer;
}

.btn-blue { background: var(--primary); }
.btn-green { background: var(--success); }
.btn-gold { background: var(--warning); color: black; }

#map {
    height: 200px;
    margin: 10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="terminal-box">
        <h3>SECURE LOGIN</h3>
        <input id="user" class="hacker-input" placeholder="admin">
        <input id="pass" type="password" class="hacker-input" placeholder="1234">
        <button class="hacker-btn" onclick="login()">Login</button>
        <div id="statusLog"></div>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage">
<header>Doctor Tracker + Drug Info</header>

<div class="container">

<!-- TABS -->
<div style="display:flex; gap:10px;">
    <button class="app-btn btn-blue" onclick="showTab('doctors')">Doctors</button>
    <button class="app-btn btn-green" onclick="showTab('drugs')">Drugs</button>
</div>

<!-- DOCTORS TAB -->
<div id="doctorsTab">

<input id="search" placeholder="Search..." onkeyup="searchDoctor()">

<button class="app-btn btn-blue" onclick="getLocation()">Get Location</button>
<button class="app-btn btn-green" onclick="saveVisit()">Save Visit</button>
<button class="app-btn btn-gold" onclick="exportExcel()">Export</button>

<div id="map"></div>

<h3 id="countLabel"></h3>
<div id="list"></div>

</div>

<!-- DRUG TAB -->
<div id="drugsTab" style="display:none;">

<div class="card">
    <span class="dr-name">Sliorap (Silodosin)</span>
    <p>
    Highly selective Alpha-1A blocker.<br>
    Targets prostate → less dizziness.<br>
    Fast urinary relief.
    </p>
</div>

<div class="card">
    <span class="dr-name">Finzap (Finasteride)</span>
    <p>
    5-alpha reductase inhibitor.<br>
    Blocks Testosterone → DHT.<br>
    Shrinks prostate size.
    </p>
</div>

</div>

</div>
</div>

<script>

// LOGIN
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        load(doctorData);
    } else {
        document.getElementById("statusLog").innerHTML = "Wrong login";
    }
}

// TABS
function showTab(tab) {
    document.getElementById("doctorsTab").style.display = "none";
    document.getElementById("drugsTab").style.display = "none";

    if (tab === "doctors") {
        document.getElementById("doctorsTab").style.display = "block";
    } else {
        document.getElementById("drugsTab").style.display = "block";
    }
}

// DATA (short sample, you can paste full list)
const doctorData = [
"Khalid Wani | Physician | Srinagar",
"Mohsin Mushtaq | General Physician | Srinagar",
"Manzoor Chalkoo | Urologist | Srinagar"
];

// LOAD
function load(list) {
    let div = document.getElementById("list");
    div.innerHTML = "";

    list.forEach(d => {
        let p = d.split("|");

        div.innerHTML += `
        <div class="card">
            <div class="dr-name">${p[0]}</div>
            <div>${p[1]}</div>
            <div>${p[2]}</div>
        </div>`;
    });

    document.getElementById("countLabel").innerText = `Found ${list.length} Doctors`;
}

// SEARCH
function searchDoctor() {
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = doctorData.filter(d => d.toLowerCase().includes(val));
    load(filtered);
}

// GPS
let currentLoc = null;

function getLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        currentLoc = pos.coords;

        document.getElementById("map").innerHTML =
        `<iframe width="100%" height="100%"
        src="https://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}&z=15&output=embed"></iframe>`;
    });
}

// SAVE
let visits = JSON.parse(localStorage.getItem("visits") || "[]");

function saveVisit() {
    if (!currentLoc) return alert("Get location first");

    visits.push({
        date: new Date().toLocaleDateString(),
        lat: currentLoc.latitude
    });

    localStorage.setItem("visits", JSON.stringify(visits));
    alert("Saved");
}

// EXPORT
function exportExcel() {
    let csv = "Date,Lat\n" +
    visits.map(v => `${v.date},${v.lat}`).join("\n");

    let blob = new Blob([csv]);
    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "report.csv";
    a.click();
}

</script>

</body>
</html>

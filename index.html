<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arundeep Systems | Pro Tracker v2.0</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #000800;
            --primary: #00c6ff;
            --success: #28a745;
            --warning: #ffc107;
            --pitch-bg: #101840;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: var(--matrix-green);
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- LOGIN PAGE --- */
        #loginPage {
            position: relative; z-index: 10;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .terminal-box {
            background: rgba(0, 10, 0, 0.95);
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 25px var(--matrix-green);
            width: 90%; max-width: 400px;
            padding: 30px; border-radius: 5px;
        }

        .hacker-input {
            width: 100%; background: transparent; border: 1px solid var(--matrix-green);
            color: var(--matrix-green); padding: 12px; margin: 10px 0;
            outline: none; font-family: 'Courier New', monospace; box-sizing: border-box;
        }

        .hacker-btn {
            width: 100%; background: var(--matrix-green); color: black;
            border: none; padding: 15px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- MAIN APP UI --- */
        #mainPage { 
            display: none; position: relative; z-index: 20; 
            background: #f4f7f6; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: #333;
        }

        header {
            padding: 20px; text-align: center; font-size: 20px; font-weight: bold;
            background: #000; color: var(--matrix-green); border-bottom: 2px solid var(--matrix-green);
        }

        .container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 80px; }

        /* Tech Console Display */
        #liveStats {
            background: #000; color: var(--matrix-green); padding: 10px;
            border-radius: 8px; font-size: 11px; margin-bottom: 15px;
            border: 1px solid #333; line-height: 1.4;
        }

        .card {
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .app-btn {
            width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px;
            font-size: 15px; font-weight: bold; cursor: pointer; color: white;
        }

        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-gold { background: var(--warning); color: #000; }
        
        #map { height: 250px; border-radius: 12px; margin: 15px 0; background: #ddd; border: 1px solid #ccc; }
        #search { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 15px; }
        footer { position: fixed; bottom: 0; width: 100%; background: #000; text-align: center; padding: 10px; font-size: 10px; color: var(--matrix-green); }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="loginPage">
    <div class="terminal-box">
        <div style="font-size:12px; margin-bottom:10px;">SYSTEM_ACCESS_V2.0</div>
        <input id="user" class="hacker-input" placeholder="IDENTITY" autocomplete="off">
        <input id="pass" type="password" class="hacker-input" placeholder="ACCESS_TOKEN">
        <button class="hacker-btn" onclick="startLoginProcess()">Bypass Firewall</button>
        <div id="statusLog" style="font-size: 10px; margin-top: 10px; height: 50px; color: #008f11;"></div>
    </div>
</div>

<div id="mainPage">
    <header>ARUNDEEP_SYSTEMS // FIELD_TRACKER</header>
    <div class="container">
        
        <div id="liveStats">
            <div>STATUS: <span id="gpsStatus">WAITING...</span></div>
            <div>ADDR: <span id="readableAddr">Detecting street...</span></div>
            <div>COORDS: <span id="liveCoords">0.000, 0.000</span></div>
        </div>

        <input id="search" placeholder="🔍 Search Doctors, Specialty, or Zip..." onkeyup="searchDoctor()">
        
        <button class="app-btn btn-blue" onclick="toggleTracking()" id="trackBtn">📡 START LIVE TRACKING</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="app-btn btn-green" onclick="saveVisit()">💾 LOG VISIT</button>
            <button class="app-btn btn-gold" onclick="exportExcel()">📤 EXPORT .CSV</button>
        </div>
        
        <div id="map"></div>
        <div id="list"></div>
    </div>
    <footer>SECURED_BY_ARUNDEEP_SYSTEMS_2026</footer>
</div>

<script>
    // --- MATRIX LOGIC (Simplified for performance) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "0123456789ABCDEF";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 8, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < rainDrops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
            rainDrops[i]++;
        }
    }
    let matrixInterval = setInterval(drawMatrix, 30);

    // --- LOGIN ---
    function startLoginProcess() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('canvas').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            load(doctorData);
        } else { alert("ACCESS DENIED"); }
    }

    // --- DATA ---
    const doctorData = [
        "Khalid . Wani | CIP5085144B | MD INTERNAL MEDICINE | SRINAGAR",
        "MOHSIN BIN MUSHTAQ | CIP4967916B | MD INTERNAL MEDICINE | SRINAGAR",
        "Manzoor Ahmad Chalkoo | B 3 | DNB UROLOGY | SRINAGAR",
        "Mohd Ashraf Lone | B 2 | DNB GEN SURGERY | SRINAGAR"
    ];

    let visits = JSON.parse(localStorage.getItem("visits") || "[]");
    let currentLoc = null;
    let watchId = null;
    let currentAddress = "Pending...";

    // --- TRACKING ENGINE ---
    function toggleTracking() {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            document.getElementById('trackBtn').innerText = "📡 START LIVE TRACKING";
            document.getElementById('gpsStatus').innerText = "PAUSED";
        } else {
            document.getElementById('trackBtn').innerText = "🛑 STOP TRACKING";
            document.getElementById('gpsStatus').innerText = "ACTIVE";
            
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                currentLoc = pos.coords;
                const { latitude: lat, longitude: lng } = pos.coords;
                
                // Update Console
                document.getElementById('liveCoords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                
                // Update Map
                document.getElementById("map").innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed"></iframe>`;

                // REVERSE GEOCODING (Free Nominatim API)
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                    const data = await res.json();
                    currentAddress = data.display_name || "Unknown Area";
                    document.getElementById('readableAddr').innerText = currentAddress;
                } catch (e) { console.log("Geocode error"); }

            }, (err) => alert("Enable GPS"), { enableHighAccuracy: true });
        }
    }

    function saveVisit() {
        if(!currentLoc) return alert("Get GPS signal first!");
        visits.push({
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString(),
            lat: currentLoc.latitude,
            lng: currentLoc.longitude,
            location: currentAddress
        });
        localStorage.setItem("visits", JSON.stringify(visits));
        alert("Visit Encrypted and Saved.");
    }

    function exportExcel() {
        if(visits.length === 0) return alert("No data to export.");
        let csv = "Date,Time,Lat,Lng,Street_Address\n" + visits.map(v => `${v.date},${v.time},${v.lat},${v.lng},"${v.location}"`).join("\n");
        let blob = new Blob([csv], { type: 'text/csv' });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Field_Report.csv";
        a.click();
    }

    function load(list) {
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";
        list.forEach(item => {
            const parts = item.split('|');
            listDiv.innerHTML += `<div class="card"><span style="font-weight:bold; color:#1d2671">${parts[0]}</span><br><small>${parts[2]}</small></div>`;
        });
    }

    function searchDoctor() {
        let val = document.getElementById("search").value.toLowerCase();
        let filtered = doctorData.filter(d => d.toLowerCase().includes(val));
        load(filtered);
    }
</script>
</body>
</html>

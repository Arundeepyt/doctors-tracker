<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arundeep Doctor Tracker Pro | Secure Access</title>
    <style>
        :root {
            --primary: #00ff41; 
            --bg-dark: #0a0a0a;
            --danger: #ff003c;
            --warning: #f39c12;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
        }

        /* --- MATRIX BACKGROUND --- */
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        /* --- LOGIN PAGE --- */
        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,255,65,0.05) 0%, rgba(0,0,0,1) 80%);
        }

        .hacker-container {
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            padding: 30px;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }

        .hacker-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .terminal-header {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 10px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: var(--primary);
            font-size: 10px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .hacker-input {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 12px;
            color: var(--primary);
            font-family: 'Courier New', monospace;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .hacker-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .btn-auth {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
        }

        #terminalLog {
            margin-top: 20px;
            font-size: 11px;
            height: 80px;
            overflow-y: auto;
            color: var(--primary);
            border-top: 1px dashed rgba(0, 255, 65, 0.3);
            padding-top: 10px;
        }

        /* --- MAIN APP UI --- */
        #mainPage { 
            display: none; 
            padding: 20px; 
            background: #f4f7f6; 
            color: #333; 
            min-height: 100vh;
        }

        .app-header {
            background: #1d2671;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin: -20px -20px 20px -20px;
        }

        .card {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #1d2671;
        }

        .dr-name { font-weight: bold; color: #1d2671; font-size: 15px; }
        .dr-detail { font-size: 11px; color: #555; margin-top: 4px; }
        .dr-tag { display: inline-block; background: #e8f0fe; color: #1d2671; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-top: 5px; font-weight: bold; }

        button.app-btn {
            border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        .bg-blue { background: #00c6ff; }
        .bg-green { background: #28a745; }
        .bg-gold { background: #ffc107; color: #000; }
    </style>
</head>

<canvas id="matrixCanvas"></canvas>

<div id="loginPage">
    <div class="hacker-container">
        <div class="terminal-header">AUTHORIZATION REQUIRED</div>
        <div class="input-group">
            <label>User Identity</label>
            <input type="text" id="user" class="hacker-input" placeholder="root@arundeep_sys" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Encryption Key</label>
            <input type="password" id="pass" class="hacker-input" placeholder="••••••••">
        </div>
        <button class="btn-auth" onclick="startHack()">Authenticate</button>
        <div id="terminalLog"></div>
    </div>
</div>

        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";

    let currentGPS = "Not Locked";

    // --- LOGIC ---
    function addLog(msg) {
        const log = document.getElementById('terminalLog');
        log.innerHTML += <div>> ${msg}</div>;
        log.scrollTop = log.scrollHeight;
    }

    function startHack() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            addLog("Bypassing firewall...");
            setTimeout(() => addLog("Injecting SQL payload..."), 300);
            setTimeout(() => addLog("Database connection established."), 600);
            setTimeout(() => {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                renderList(doctors);
            }, 1000);
        } else {
            addLog("CRITICAL ERROR: Authorization Denied.");
        }
    }

    function renderList(data) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        data.forEach(d => {
            listDiv.innerHTML += `
                <div class="card">
                    <div class="dr-name">${d.name}</div>
                    <div class="dr-tag">${d.spec}</div>
                    <div class="dr-detail">
                        <b>Qual:</b> ${d.qual}<br>
                        <b>Legacy:</b> ${d.code} | <b>Class:</b> ${d.class}<br>
                        <b>Loc:</b> ${d.city} (${d.pin})
                    </div>
                </div>`;
        });
        document.getElementById('countLabel').innerText = Results Found: ${data.length};
    }

    function searchDoctor() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = doctors.filter(d => 
            d.name.toLowerCase().includes(q) || 
            d.spec.toLowerCase().includes(q) || 
            d.city.toLowerCase().includes(q) ||
            d.qual.toLowerCase().includes(q)
        );
        renderList(filtered);
    }

    function getLocation() {
        const map = document.getElementById('map');
        map.innerText = "🛰️ Connecting to satellites...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentGPS = ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)};
                map.innerHTML = 📍 LOCKED: <span style="color:#28a745">${currentGPS}</span>;
            }, () => map.innerText = "❌ GPS Access Denied");
        }
    }

    function saveVisit() {
        alert(Visit Synced!\nGPS: ${currentGPS}\nTime: ${new Date().toLocaleTimeString()});
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(doctors);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Doctors_JK");
        XLSX.writeFile(wb, "Doctor_Data_Export.xlsx");
    }

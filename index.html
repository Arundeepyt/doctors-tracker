<script>
    // MATRIX
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < rainDrops.length; i++) {
            const text = alphabet[Math.floor(Math.random() * alphabet.length)];
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                rainDrops[i] = 0;
            }
            rainDrops[i]++;
        }
    }
    setInterval(drawMatrix, 30);

    // LOGIN
    function startLoginProcess() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const log = document.getElementById('statusLog');

        log.innerHTML = "";

        if (u === "admin" && p === "1234") {
            const steps = [
                "> Bypassing Firewall...",
                "> Connecting to Server...",
                "> Decrypting Doctor Database...",
                "> Access Granted..."
            ];

            let i = 0;

            const timer = setInterval(() => {
                if (i < steps.length) {
                    log.innerHTML += `<div>${steps[i]}</div>`;
                    i++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('loginPage').style.display = 'none';
                        document.getElementById('canvas').style.display = 'none';
                        document.getElementById('mainPage').style.display = 'block';
                        load(doctorData);
                    }, 800);
                }
            }, 600);

        } else {
            log.innerHTML = "<div style='color:red'>> ERROR: ACCESS DENIED</div>";
        }
    }

    // DATA
    const doctorData = [...doctorData]; // keep your existing array

    let visits = JSON.parse(localStorage.getItem("visits") || "[]");
    let currentLoc = null;

    function load(list) {
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";

        list.forEach(item => {
            const parts = item.split('|');

            listDiv.innerHTML += `
                <div class="card">
                    <span class="dr-name">${parts[0]}</span>
                    <div class="dr-detail">
                        <b>ID:</b> ${parts[1] || 'N/A'}<br>
                        <b>Spec:</b> ${parts[2] || 'N/A'}<br>
                        <b>Loc:</b> ${parts[3] || 'N/A'}
                    </div>
                </div>`;
        });

        document.getElementById("countLabel").innerText = `Found ${list.length} Doctors`;
    }

    function searchDoctor() {
        let val = document.getElementById("search").value.toLowerCase();
        let filtered = doctorData.filter(d => d.toLowerCase().includes(val));
        load(filtered);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            currentLoc = pos.coords;

            document.getElementById("map").innerHTML = `
                <iframe width="100%" height="100%" frameborder="0"
                src="https://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}&z=15&output=embed">
                </iframe>`;
        }, () => {
            alert("Enable GPS permission!");
        });
    }

    function saveVisit() {
        if (!currentLoc) {
            alert("Click GPS first!");
            return;
        }

        visits.push({
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString(),
            lat: currentLoc.latitude,
            lng: currentLoc.longitude
        });

        localStorage.setItem("visits", JSON.stringify(visits));
        alert("Visit Saved ✅");
    }

    function exportExcel() {
        if (visits.length === 0) {
            alert("No data!");
            return;
        }

        let csv = "Date,Time,Lat,Lng\n" +
            visits.map(v => `${v.date},${v.time},${v.lat},${v.lng}`).join("\n");

        let blob = new Blob([csv], { type: 'text/csv' });
        let a = document.createElement("a");

        a.href = URL.createObjectURL(blob);
        a.download = "Visits_Report.csv";
        a.click();
    }
</script>
